{% extends 'base.html' %}

{% block main %}
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {% if form.non_field_errors %}
            <div class="alert alert-danger">
                {% for error in form.non_field_errors %}
                    <p>{{ error }}</p>
                {% endfor %}
            </div>
        {% endif %}
        {{ form.as_p }}

        <button type="submit" class="btn btn-success">Saqlamoq</button>
    </form>
{% endblock main %}
