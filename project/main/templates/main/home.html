{% extends 'base.html' %}
{% block main %}
<div id="carouselExample" class="carousel slide mb-5">
    <div class="carousel-inner">
        {% for car in cars %}
        <div class="carousel-item {% if forloop.first %}active{% endif %}">
            <p><b>Avtomobil: {{ car.name }}</b></p>
            {% if car.image %}
            <img src="{{ car.image.url }}" class="d-block w-100" alt="{{ car.name }}">
            {% endif %}
        </div>
        {% endfor %}
    </div>
    <button class="carousel-control-prev" type="button" data-bs-target="#carouselExample" data-bs-slide="prev">
        <span class="carousel-control-prev-icon"></span>
        <span class="text-dark">Oldingisi</span>
    </button>
    <button class="carousel-control-next" type="button" data-bs-target="#carouselExample" data-bs-slide="next">
        <span class="carousel-control-next-icon"></span>
        <span class="text-dark">Keyingisi</span>
    </button>
</div>
<div class="row row-cols-1 row-cols-md-4 g-4 mt-3">
    {% for brand in brands %}
    <div class="col">
        <div class="card h-100 text-center shadow-sm">
            {% if brand.emblem %}
                <img src="{{ brand.emblem.url }}" class="card-img-top p-3" alt="..." style="height: 120px; object-fit: contain;">
            {% else %}
                <img src="https://via.placeholder.com/150x100?text=LOGO" class="card-img-top p-3" style="height: 120px; object-fit: contain;">
            {% endif %}

            <div class="card-body">
                <h5 class="card-title">{{ brand.model }}</h5>
                <p class="text-muted small">Avtomobil brendi</p>
                <a href="{% url 'brand_cars' brand.id %}" class="btn btn-sm btn-primary">Modellarni ko'rish</a>
            </div>
        </div>
    </div>
            {% endfor %}
        </div>
{% endblock main %}
